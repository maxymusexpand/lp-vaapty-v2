            var i, j, q = [];
            for (i = 0; i < form.elements.length; i++) {
                if (form.elements[i].name === "") {
                    continue
                }
                switch (form.elements[i].nodeName) {
                    case "INPUT":
                        switch (form.elements[i].type) {
                            case "tel":
                                q.push(form.elements[i].name + "=" + encodeURIComponent(form.elements[i].previousSibling.querySelector('div.iti__selected-dial-code').innerText) + encodeURIComponent(" ") + encodeURIComponent(form.elements[i].value));
                                break;
                            case "text":
                            case "number":
                            case "date":
                            case "time":
                            case "hidden":
                            case "password":
                            case "button":
                            case "reset":
                            case "submit":
                                q.push(form.elements[i].name + "=" + encodeURIComponent(form.elements[i].value));
                                break;
                            case "checkbox":
                            case "radio":
                                if (form.elements[i].checked) {
                                    q.push(form.elements[i].name + "=" + encodeURIComponent(form.elements[i].value))
                                }
                                break;
                            case "file":
                                break
                        }
                        break;
                    case "TEXTAREA":
                        q.push(form.elements[i].name + "=" + encodeURIComponent(form.elements[i].value));
                        break;
                    case "SELECT":
                        switch (form.elements[i].type) {
                            case "select-one":
                                q.push(form.elements[i].name + "=" + encodeURIComponent(form.elements[i].value));
                                break;
                            case "select-multiple":
                                for (j = 0; j < form.elements[i].options.length; j++) {
                                    if (form.elements[i].options[j].selected) {
                                        q.push(form.elements[i].name + "=" + encodeURIComponent(form.elements[i].options[j].value))
                                    }
                                }
                                break
                        }
                        break;
                    case "BUTTON":
                        switch (form.elements[i].type) {
                            case "reset":
                            case "submit":
                            case "button":
                                q.push(form.elements[i].name + "=" + encodeURIComponent(form.elements[i].value));
                                break
                        }
                        break
                }
            }
            return q.join("&")
        };

        const formSupportsPost = false;
        var form_submit = function (e) {

            e.preventDefault();
            if (validate_form()) {
                if (form_to_submit.querySelector('input[name="phone"]') && typeof iti != 'undefined') {
                    form_to_submit.querySelector('input[name="phone"]').value = iti.getNumber();
                }
                // use this trick to get the submit button & disable it using plain javascript
                var submitButton = e.target.querySelector('#_form_7_submit');
                submitButton.disabled = true;
                submitButton.classList.add('processing');
                var serialized = _form_serialize(document.getElementById('_form_7_')).replace(/%0A/g, '\\n');
                var err = form_to_submit.querySelector('._form_error');
                err ? err.parentNode.removeChild(err) : false;
                async function submitForm() {
                    var formData = new FormData();
                    const searchParams = new URLSearchParams(serialized);
                    searchParams.forEach((value, key) => {
                        if (key !== 'hideButton') {
                            formData.append(key, value);
                        }
                    });
                    let request = {
                        headers: {
                            "Accept": "application/json"
                        },
                        body: formData,
                        method: "POST"
                    };

                    let pageUrlParams = new URLSearchParams(window.location.search);
                    if (pageUrlParams.has('t')) {
                        request.headers.Authorization = 'Bearer ' + pageUrlParams.get('t');
                    }
                    const response = await fetch('https://maximuss.activehosted.com/proc.php?jsonp=true', request);

                    return response.json();
                }
                if (formSupportsPost) {
                    submitForm().then((data) => {
                        eval(data.js);
                    }).catch(() => {
                        _show_error("7", "Desculpe, seu envio falhou. Tente novamente.");
                    });
                } else {
                    _load_script('https://maximuss.activehosted.com/proc.php?' + serialized + '&jsonp=true', null, true);
                }
            }
            return false;
        };
        addEvent(form_to_submit, 'submit', form_submit);
    })();
</script>
